<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vigil Check-in Settings</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        background: #0d1117;
        color: #e6edf3;
        padding: 24px;
        max-width: 520px;
      }
      h1 {
        font-size: 18px;
        margin-bottom: 16px;
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin-bottom: 6px;
        color: #9da7b3;
      }
      input {
        width: 100%;
        height: 40px;
        border: 1px solid #30363d;
        background: #161b22;
        color: #e6edf3;
        padding: 0 10px;
      }
      button {
        height: 40px;
        padding: 0 16px;
        border: 0;
        background: #2f81f7;
        color: #fff;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        cursor: pointer;
      }
      p {
        color: #9da7b3;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <h1>Vigil Check-in Reminder</h1>
    <p>This extension only reminds you and opens your Vigil dashboard check-in screen.</p>

    <div class="field">
      <label for="checkInUrl">Check-in URL</label>
      <input id="checkInUrl" type="url" />
    </div>

    <div class="field">
      <label for="reminderIntervalMinutes">Reminder interval (minutes)</label>
      <input id="reminderIntervalMinutes" type="number" min="60" step="60" />
    </div>

    <button id="saveButton" type="button">Save</button>
    <p id="status"></p>

    <script src="options.js"></script>
  </body>
</html>
